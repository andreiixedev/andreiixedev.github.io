name: Nightly Release

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "changelog-software/**"
      - ".github/workflows/nightly.yml"

permissions:
  contents: write

concurrency:
  group: changelog-software-nightly
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
            output: AndreiixeDevStudio.exe
            archive: AndreiixeDevStudio-Windows.zip

          - os: ubuntu-latest
            name: Linux
            output: AndreiixeDevStudio
            archive: AndreiixeDevStudio-Linux.zip

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: changelog-software

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: changelog-software/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build Windows
        if: matrix.name == 'Windows'
        run: go build -ldflags="-s -w -H=windowsgui" -o ${{ matrix.output }} main.go

      - name: Build Linux
        if: matrix.name == 'Linux'
        run: go build -ldflags="-s -w" -o ${{ matrix.output }} main.go

      - name: Package Windows
        if: matrix.name == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path ${{ matrix.output }}, changelog.json, projects.json `
            -DestinationPath ../${{ matrix.archive }}

      - name: Package Linux
        if: matrix.name == 'Linux'
        run: |
          zip -r ../${{ matrix.archive }} \
            ${{ matrix.output }} \
            changelog.json \
            projects.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get commit info
        id: info
        run: |
          echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format=%cd --date=format:'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "msg=$(git log -1 --format=%s)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --format=%an)" >> $GITHUB_OUTPUT

      - name: Update Nightly Release
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: "🌙 AndreiixeDev Studio - Nightly"
          body: |
            ## Automatic nightly build

            **Commit:** `${{ steps.info.outputs.hash }}`
            **Author:** ${{ steps.info.outputs.author }}
            **Date:** ${{ steps.info.outputs.date }}

            ### Latest commit message
            ${{ steps.info.outputs.msg }}

            ### Included builds
            - Windows
            - Linux

            Generated automatically from:
            `changelog-software/`
          files: |
            artifacts/*.zip