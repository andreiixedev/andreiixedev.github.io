name: Build Changelog Software Release

on:
  push:
    branches: ["main", "master"]
    paths:
      - "changelog-software/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: changelog-software

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: changelog-software/go.sum

      - name: Install dependencies
        run: go mod tidy

      - name: Build Windows EXE
        run: go build -ldflags="-s -w -H=windowsgui" -o AndreiixeDevStudio.exe main.go

      - name: Package EXE
        run: Compress-Archive -Path AndreiixeDevStudio.exe, changelog.json, projects.json -DestinationPath AndreiixeDevStudio-Windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: changelog-software-${{ github.run_number }}
          name: Changelog Software Build ${{ github.run_number }}
          body: |
            Automatic build from changelog-software.
            Commit: ${{ github.sha }}
          files: changelog-software/AndreiixeDevStudio-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}