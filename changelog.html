<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changelog | AndreiixeDev.</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;,">
    <script src="js/favicon.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles/style.css">
    <style>
        .changelog-timeline {
            position: relative;
            padding: 20px 0;
        }

        .changelog-timeline::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent);
            opacity: 0.3;
        }

        .changelog-item {
            position: relative;
            padding-left: 60px;
            margin-bottom: 40px;
            animation: slideIn 0.5s ease-out;
            animation-fill-mode: both;
        }

        .changelog-item:nth-child(1) { animation-delay: 0.1s; }
        .changelog-item:nth-child(2) { animation-delay: 0.2s; }
        .changelog-item:nth-child(3) { animation-delay: 0.3s; }
        .changelog-item:nth-child(4) { animation-delay: 0.4s; }
        .changelog-item:nth-child(5) { animation-delay: 0.5s; }
        .changelog-item:nth-child(6) { animation-delay: 0.6s; }
        .changelog-item:nth-child(7) { animation-delay: 0.7s; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .changelog-marker {
            position: absolute;
            left: 0;
            top: 0;
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-primary);
            font-size: 18px;
            box-shadow: 0 0 20px var(--accent);
            border: 2px solid var(--bg-secondary);
            z-index: 2;
        }

        .changelog-content {
            background: var(--bg-tertiary);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 8px 8px 15px var(--shadow-dark), -8px -8px 15px var(--shadow-light);
            border: 1px solid var(--border-light);
        }

        .changelog-date {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            color: var(--accent);
            background: var(--bg-secondary);
            padding: 5px 15px;
            border-radius: 30px;
            margin-bottom: 15px;
            border: 1px solid var(--accent);
        }

        .changelog-title {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .changelog-version {
            display: inline-block;
            background: var(--accent);
            color: var(--bg-primary);
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 15px;
            vertical-align: middle;
        }

        .changelog-list {
            list-style: none;
            padding: 0;
        }

        .changelog-list li {
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .changelog-list li i {
            width: 20px;
            margin-top: 3px;
        }

        .changelog-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 10px;
            min-width: 70px;
            text-align: center;
        }

        .tag-added {
            background: #4CAF50;
            color: white;
        }

        .tag-changed {
            background: #FFC107;
            color: #333;
        }

        .tag-fixed {
            background: #F44336;
            color: white;
        }

        .tag-improved {
            background: #2196F3;
            color: white;
        }

        .tag-removed {
            background: #9C27B0;
            color: white;
        }

        /* Stats cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-tertiary);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Filter buttons */
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 20px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 30px;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-size: 14px;
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            color: var(--accent);
        }

        .filter-btn.active {
            background: var(--accent);
            color: var(--bg-primary);
        }

        @media (max-width: 600px) {
            .changelog-timeline::before {
                left: 15px;
            }
            
            .changelog-item {
                padding-left: 45px;
            }
            
            .changelog-marker {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
            
            .changelog-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">AndreiixeDev.</div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="live-clock">
                    <i class="far fa-clock"></i>
                    <span id="clock">--:--:--</span>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="navbar">
            <a href="index.html" class="nav-link">home</a>
            <a href="changelog.html" class="nav-link active">changelog</a>
            <a href="projects.html" class="nav-link">projects</a>
            <a href="links.html" class="nav-link">links</a>
        </div>

        <!-- CHANGELOG PAGE CONTENT -->
        <div class="card">
            <div class="card-title">
                <i class="fas fa-history"></i> changelog
                <span style="font-size: 14px; margin-left: 15px; color: var(--text-muted);">latest updates</span>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalUpdates">0</div>
                    <div class="stat-label">total updates</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="featuresAdded">0</div>
                    <div class="stat-label">features added</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="bugsFixed">0</div>
                    <div class="stat-label">bugs fixed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="improvements">0</div>
                    <div class="stat-label">improvements</div>
                </div>
            </div>

            <!-- Filter buttons -->
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">all</button>
                <button class="filter-btn" data-filter="added">added</button>
                <button class="filter-btn" data-filter="changed">changed</button>
                <button class="filter-btn" data-filter="fixed">fixed</button>
                <button class="filter-btn" data-filter="improved">improved</button>
            </div>

            <!-- Timeline -->
            <div class="changelog-timeline" id="changelogTimeline">
                <div style="text-align: center; padding: 40px;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 32px; color: var(--accent);"></i>
                    <p style="margin-top: 15px;">Loading changelog...</p>
                </div>
            </div>

            <!-- Future updates -->
            <div style="margin-top: 40px; padding: 20px; background: var(--bg-tertiary); border-radius: 20px; text-align: center;">
                <i class="fas fa-code-branch" style="font-size: 24px; color: var(--accent); margin-bottom: 10px;"></i>
                <h3 style="font-family: 'DM Serif Display'; color: var(--text-secondary); margin-bottom: 10px;">coming soon</h3>
                <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;" id="futureFeatures">
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>2026 • Andreiixe</p>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/changelog.js"></script>
</body>
</html>
