<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | AndreiixeDev.</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;,">
    <script src="js/favicon.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles/style.css">
    <style>
        #model-container {
            width: 100%;
            height: 400px;
            position: relative;
            margin: 20px 0 30px;
            border-radius: 30px;
            overflow: hidden;
            background: radial-gradient(circle at center, #2a2a2a 0%, #1a1a1a 100%);
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
            cursor: grab;
        }

        #model-container:active {
            cursor: grabbing;
        }

        /* Loading indicator */
        .loading-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--accent);
            font-size: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .loading-indicator i {
            font-size: 40px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Typing animation */
        .typing-container {
            font-family: 'Quicksand', monospace;
            font-size: 24px;
            color: var(--accent);
            margin: 30px 0 20px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .static-text {
            font-weight: 500;
            color: var(--text-secondary);
        }

        .dynamic-text {
            font-weight: 700;
            color: var(--accent);
            position: relative;
            background: var(--bg-tertiary);
            padding: 8px 20px;
            border-radius: 40px;
            box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
            min-width: 200px;
            text-align: center;
        }

        .dynamic-text::after {
            content: '|';
            position: absolute;
            right: 10px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            #model-container {
                height: 300px;
            }
            
            .typing-container {
                font-size: 18px;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">AndreiixeDev.</div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="live-clock">
                    <i class="far fa-clock"></i>
                    <span id="clock">--:--:--</span>
                </div>
            </div>
        </div>

        <div class="navbar">
            <a href="index.html" class="nav-link active">Home</a>
            <a href="changelog.html" class="nav-link">Changelog</a>
            <a href="projects.html" class="nav-link">Projects</a>
            <a href="links.html" class="nav-link">Links</a>
        </div>

        <!-- HOME PAGE CONTENT -->
        <div class="card">
            
            <div id="model-container">
                <div class="loading-indicator" id="loadingIndicator">
                    <i class="fas fa-cog"></i>
                    <span>loading model 3D...</span>
                </div>
            </div>

            <div class="typing-container">
                <span class="static-text">welcome,</span>
                <span class="dynamic-text" id="changingText"></span>
            </div>
            
            <div style="font-size: 20px; text-align: center; padding: 20px;">
                <p>Did you forget who I am? Look, I’m still here, lost in the world 🌍</p>
                <p style="margin-top: 15px;">🌿 Check out what’s new in <b>Projects</b> </p>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>2026 • Andreiixe</p>
        </div>
    </div>

    <!-- Three.js libraries -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script src="js/script.js"></script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const words = ['world', 'pikachu', 'andreiixe', 'friend', 'developer', 'explorer', 'coder'];
        const changingText = document.getElementById('changingText');
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        let isWaiting = false;

        function typeEffect() {
            const currentWord = words[wordIndex];
            
            if (isDeleting) {
                changingText.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                changingText.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            if (!isDeleting && charIndex === currentWord.length) {
                isWaiting = true;
                setTimeout(() => {
                    isDeleting = true;
                    isWaiting = false;
                }, 2000);
            }

            if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
            }

            const speed = isDeleting ? 50 : 100;
            
            if (!isWaiting) {
                setTimeout(typeEffect, speed);
            } else {
                setTimeout(typeEffect, 100);
            }
        }

        setTimeout(typeEffect, 1000);

        // Load Three.js
        const container = document.getElementById('model-container');
        const loadingIndicator = document.getElementById('loadingIndicator');
        
        // Just scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        
        // Camera position
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(3, 2, 5);
        camera.lookAt(0, 1, 0);
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2;
        controls.enableZoom = true;
        controls.maxPolarAngle = Math.PI / 2;
        
        // Ambient light
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // Main directional light
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 5, 3);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 10;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 15;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x4466ff, 0.5);
        fillLight.position.set(-2, 1, 2);
        scene.add(fillLight);
        
        // Back light
        const backLight = new THREE.PointLight(0xff66aa, 0.3);
        backLight.position.set(0, 1, -3);
        scene.add(backLight);
        
        // Ground plane
        const planeGeometry = new THREE.CircleGeometry(5, 32);
        const planeMaterial = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, side: THREE.DoubleSide });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -0.5;
        plane.receiveShadow = true;
        scene.add(plane);
        
        // Particles
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 500;
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i += 3) {
            posArray[i] = (Math.random() - 0.5) * 10;
            posArray[i+1] = (Math.random() - 0.5) * 5;
            posArray[i+2] = (Math.random() - 0.5) * 10;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.05,
            color: 0x88aaff,
            transparent: true,
            opacity: 0.5
        });
        
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        const loader = new GLTFLoader();
        const modelUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Monitor/glTF-Binary/Monitor.glb'; //thx KhronosGroup for Model
        
        loader.load(
            modelUrl,
            (gltf) => {
                // Load Model
                const model = gltf.scene;
                
                model.scale.set(2, 2, 2);
                model.position.set(0, 0.5, 0);
                model.rotation.y = Math.PI / 4;
                
                model.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                        
                        if (node.material) {
                            if (Array.isArray(node.material)) {
                                node.material.forEach(mat => {
                                    mat.roughness = 0.3;
                                    mat.metalness = 0.7;
                                    mat.emissive = new THREE.Color(0x111122);
                                });
                            } else {
                                node.material.roughness = 0.3;
                                node.material.metalness = 0.7;
                                node.material.emissive = new THREE.Color(0x111122);
                            }
                        }
                    }
                });
                
                scene.add(model);
                
                loadingIndicator.style.display = 'none';
            },
            (xhr) => {
                const percent = Math.floor((xhr.loaded / xhr.total) * 100);
                loadingIndicator.innerHTML = `
                    <i class="fas fa-cog"></i>
                    <span>Loading... ${percent}%</span>
                `;
            },
            (error) => {
                console.error('Error:', error);
                loadingIndicator.innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="color: #ff4444;"></i>
                    <span>Failed to load the 3D model</span>
                `;
                
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x224466 });
                const cube = new THREE.Mesh(geometry, material);
                cube.castShadow = true;
                cube.receiveShadow = true;
                cube.position.set(0, 0.5, 0);
                scene.add(cube);
                
                const screenGeom = new THREE.BoxGeometry(1.5, 1, 0.2);
                const screenMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x224466 });
                const screen = new THREE.Mesh(screenGeom, screenMat);
                screen.position.set(0, 0.8, 0.3);
                screen.castShadow = true;
                screen.receiveShadow = true;
                scene.add(screen);
                
                const standGeom = new THREE.CylinderGeometry(0.2, 0.3, 0.5);
                const standMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
                const stand = new THREE.Mesh(standGeom, standMat);
                stand.position.set(0, 0.25, 0);
                stand.castShadow = true;
                stand.receiveShadow = true;
                scene.add(stand);
                
                setTimeout(() => {
                    loadingIndicator.style.display = 'none';
                }, 1000);
            }
        );

        function animate() {
            requestAnimationFrame(animate);
            
            particlesMesh.rotation.y += 0.0005;
            
            controls.update(); 
            renderer.render(scene, camera);
        }
        
        animate();

        // Handle resize
        window.addEventListener('resize', onWindowResize, false);
        
        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        container.addEventListener('dblclick', () => {
            controls.autoRotate = !controls.autoRotate;
        });
    </script>
</body>
</html>
