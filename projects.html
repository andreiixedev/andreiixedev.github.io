<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | AndreiixeDev.</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;,">
    <script src="js/favicon.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles/style.css">
    <style>
        .projects-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .filters-section {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            position: relative;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 40px 10px 15px;
            border: none;
            border-radius: 30px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            font-family: 'Quicksand', sans-serif;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 30px;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-size: 14px;
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            color: var(--accent);
        }

        .filter-btn.active {
            background: var(--accent);
            color: var(--bg-primary);
            box-shadow: 0 5px 15px var(--accent);
        }

        .featured-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 5px 15px;
            background: var(--bg-tertiary);
            border-radius: 30px;
            box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
        }

        .featured-toggle input {
            display: none;
        }

        .featured-toggle .toggle-slider {
            width: 40px;
            height: 20px;
            background: var(--bg-secondary);
            border-radius: 20px;
            position: relative;
            transition: all 0.3s;
            box-shadow: inset 2px 2px 5px var(--shadow-dark);
        }

        .featured-toggle .toggle-slider::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .featured-toggle input:checked + .toggle-slider::before {
            transform: translateX(20px);
        }

        .featured-toggle span:last-child {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Projects Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .project-item {
            background: var(--bg-tertiary);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 8px 8px 15px var(--shadow-dark), -8px -8px 15px var(--shadow-light);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
        }

        .project-item:hover {
            transform: translateY(-8px);
            background: var(--bg-secondary);
            box-shadow: 12px 12px 20px var(--shadow-dark), -12px -12px 20px var(--shadow-light);
        }

        .project-item.featured::before {
            content: '⭐';
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 20px;
            z-index: 2;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .project-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 3px solid var(--accent);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            background: var(--bg-primary);
        }

        .project-item:hover .project-image {
            transform: scale(1.02);
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
        }

        .project-item h3 {
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .project-item p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.5;
            flex-grow: 1;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 10px 0;
        }

        .project-tag {
            background: var(--bg-secondary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            border: 1px solid var(--accent);
            text-transform: lowercase;
        }

        .project-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 13px;
            border-top: 1px dashed var(--text-muted);
            padding-top: 15px;
            margin-top: auto;
        }

        .project-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .project-links {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .project-link {
            color: var(--text-secondary);
            transition: all 0.3s;
            font-size: 16px;
            padding: 6px;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            box-shadow: 2px 2px 5px var(--shadow-dark), -2px -2px 5px var(--shadow-light);
            text-decoration: none;
        }

        .project-link:hover {
            color: var(--accent);
            transform: translateY(-2px) scale(1.1);
            box-shadow: 3px 3px 8px var(--shadow-dark), -3px -3px 8px var(--shadow-light);
        }

        .project-link.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 30px;
            padding: 40px;
            max-width: 900px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 2px solid var(--accent);
            animation: modalZoom 0.3s ease;
        }

        @keyframes modalZoom {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            z-index: 1001;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--bg-tertiary);
            box-shadow: 2px 2px 5px var(--shadow-dark), -2px -2px 5px var(--shadow-light);
        }

        .close-modal:hover {
            color: var(--accent);
            transform: rotate(90deg);
        }

        .no-results {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            display: none;
            background: var(--bg-tertiary);
            border-radius: 30px;
            margin-top: 20px;
        }

        .no-results i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .no-results h3 {
            font-family: 'DM Serif Display', serif;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .loading-spinner {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px;
        }

        .loading-spinner i {
            font-size: 48px;
            color: var(--accent);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .projects-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filters-section {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-box {
                min-width: 100%;
            }
            
            .filter-buttons {
                justify-content: center;
            }
            
            .featured-toggle {
                justify-content: center;
            }
            
            .modal-content {
                padding: 20px;
            }
            
            .modal-content img {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">AndreiixeDev.</div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="live-clock">
                    <i class="far fa-clock"></i>
                    <span id="clock">--:--:--</span>
                </div>
            </div>
        </div>

        <div class="navbar">
            <a href="index.html" class="nav-link">home</a>
            <a href="changelog.html" class="nav-link">Changelog</a>
            <a href="projects.html" class="nav-link active">projects</a>
            <a href="links.html" class="nav-link">links</a>
        </div>

        <!-- PROJECTS PAGE CONTENT -->
        <div class="card">
            <div class="card-title">
                <i class="fas fa-project-diagram"></i> projects
            </div>

            <div class="projects-header">
                <div class="search-box">
                    <input type="text" id="searchProjects" placeholder="search projects..." aria-label="Search projects">
                    <i class="fas fa-search"></i>
                </div>
                
                <div class="filters-section">
                    <div id="categoryFilters" class="filter-buttons">
                    </div>
                    
                    <label class="featured-toggle" aria-label="Show featured only">
                        <input type="checkbox" id="featuredToggle">
                        <span class="toggle-slider"></span>
                        <span>featured only</span>
                    </label>
                </div>
            </div>
            
            <div class="projects-grid" id="projectsGrid">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p style="margin-top: 15px; color: var(--text-muted);">Loading projects...</p>
                </div>
            </div>

            <div class="no-results" id="noResults">
                <i class="fas fa-folder-open"></i>
                <h3>No projects found</h3>
                <p>Try adjusting your filters or search</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>2026 • Andreiixe</p>
        </div>
    </div>

    <div id="projectModal" class="modal" onclick="closeProjectModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeProjectModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/projects.js"></script>
</body>
</html>
